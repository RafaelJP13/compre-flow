services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/Dockerfile.react.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  dashboard-empresas:
    build:
      context: ./dashboard-empresas
      dockerfile: ../infra/Dockerfile.next.dev
    ports:
      - "3001:3001"
    volumes:
      - ./dashboard-empresas:/app
      - /app/node_modules
  backend:
    build:
      context: ./backend
      dockerfile: ../infra/Dockerfile.backend.dev
    command: sh -c "npx prisma migrate deploy && npm run seed && npm run start:dev"
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}

  postgres:
    image: postgres:16
    container_name: shopping-cart-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: